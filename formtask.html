<!DOCTYPE html>
<html>

<head>
    <title>HTML Form - All Input Types</title>
</head>

<body>

    <h2>HTML Form - All Input Types</h2>

    <form>

        <!-- Text -->
        <label>Text:</label>
        <input type="text" placeholder="Enter your name">
        <br><br>

        <!-- Password -->
        <label>Password:</label>
        <input type="password" placeholder="Enter password">
        <br><br>

        <!-- Email -->
        <label>Email:</label>
        <input type="email" placeholder="Enter email">
        <br><br>

        <!-- Number -->
        <label>Number:</label>
        <input type="number" min="1" max="100">
        <br><br>

        <!-- Telephone -->
        <label>Phone:</label>
        <input type="tel" placeholder="9876543210">
        <br><br>

        <!-- URL -->
        <label>Website:</label>
        <input type="url" placeholder="https://example.com">
        <br><br>

        <!-- Search -->
        <label>Search:</label>
        <input type="search" placeholder="Search here">
        <br><br>

        <!-- Date -->
        <label>Date:</label>
        <input type="date">
        <br><br>

        <!-- Time -->
        <label>Time:</label>
        <input type="time">
        <br><br>

        <!-- Date and Time -->
        <label>Date & Time:</label>
        <input type="datetime-local">
        <br><br>

        <!-- Month -->
        <label>Month:</label>
        <input type="month">
        <br><br>

        <!-- Week -->
        <label>Week:</label>
        <input type="week">
        <br><br>

        <!-- Color -->
        <label>Favorite Color:</label>
        <input type="color">
        <br><br>

        <!-- Range -->
        <label>Range:</label>
        <input type="range" min="0" max="100">
        <br><br>

        <!-- Radio Buttons -->
        <label>Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <!-- Checkboxes -->
        <label>Hobbies:</label>
        <input type="checkbox"> Reading
        <input type="checkbox"> Music
        <input type="checkbox"> Sports
        <br><br>

        <!-- File Upload -->
        <label>Upload File:</label>
        <input type="file">
        <br><br>

        <!-- Hidden -->
        <input type="hidden" value="12345">

        <!-- Image Button -->
        <label>Image Button:</label><br>
        <input type="image" src="https://via.placeholder.com/100x40?text=Submit" alt="Submit">
        <br><br>

        <!-- Submit -->
        <input type="submit" value="Submit">

        <!-- Reset -->
        <input type="reset" value="Reset">

        <!-- Normal Button -->
        <input type="button" value="Click Me">

    </form>

</body>

</html>
